<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Black Keyboard Toy</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="help" role="note" aria-label="How to play">
    <div class="help-title">How to play</div>
    <ul class="help-list">
      <li>Move the mouse around.</li>
      <li>Press letters to spawn effects.</li>
      <li>Hold Shift for a different letter animation.</li>
      <li>Press 0–9 to change the background.</li>
      <li>Press <span class="help-key">`</span> to hide/show this help.</li>
    </ul>
  </div>

  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <script src="assets/script.js"></script>
</body>
</html>
